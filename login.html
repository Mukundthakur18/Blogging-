<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Yug Samachar</title>

  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <style>
    .login-wrapper {
      min-height: calc(100vh - 80px);
      /* Minus header height */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-color) 100%);
    }

    .login-container {
      width: 100%;
      max-width: 450px;
      background-color: var(--card-bg);
      border-radius: var(--border-radius-lg);
      box-shadow: var(--card-shadow-hover);
      border: 1px solid var(--border-color);
      overflow: hidden;
    }

    .login-header {
      padding: 40px 40px 20px;
      text-align: center;
    }

    .login-header .logo {
      justify-content: center;
      margin-bottom: 24px;
      font-size: 2rem;
    }

    .login-header h1 {
      font-size: 1.5rem;
      margin-bottom: 8px;
    }

    .login-header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .login-body {
      padding: 0 40px 40px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text-primary);
      font-size: 0.95rem;
    }

    .form-control {
      width: 100%;
      padding: 14px 20px;
      border-radius: var(--border-radius-sm);
      border: 1px solid var(--border-color);
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 1rem;
      outline: none;
      transition: all var(--transition-fast);
    }

    .form-control:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    .login-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      font-size: 0.875rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .forgot-password {
      color: var(--primary-color);
      font-weight: 500;
      text-decoration: none;
    }

    .forgot-password:hover {
      text-decoration: underline;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      margin-bottom: 24px;
    }

    .login-footer {
      text-align: center;
      font-size: 0.95rem;
      color: var(--text-secondary);
    }

    .login-footer a {
      color: var(--primary-color);
      font-weight: 600;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div id="loader" class="loader-container">
    <div class="loader"></div>
  </div>

  <header class="header">
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <i class="ri-quill-pen-line"></i>
        Yug<span>Samachar</span>
      </a>

      <div class="nav-actions" style="margin-left: auto;">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">
          <i class="ri-moon-line"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="login-wrapper">
    <div class="login-container">
      <div class="login-header">
        <a href="index.html" class="logo">
          <i class="ri-quill-pen-line"></i>
          Yug<span>Samachar</span>
        </a>
        <h1>Welcome Back</h1>
        <p>Enter your credentials to access your account.</p>
      </div>

      <div class="login-body">
        <form id="login-form">
          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="reader@example.com" required>
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          </div>

          <div class="login-options">
            <label class="remember-me">
              <input type="checkbox"> Remember me
            </label>
            <a href="#" class="forgot-password">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-login">Sign In</button>

          <div class="login-footer">
            Don't have an account? <a href="#">Create one</a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="./js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginForm = document.getElementById('login-form');

      if (loginForm) {
        loginForm.addEventListener('submit', (e) => {
          e.preventDefault();

          const emailInput = document.getElementById('email').value;

          // Basic simulation logic
          if (emailInput) {
            // Extract a name from email
            const name = emailInput.split('@')[0];
            const formattedName = name.charAt(0).toUpperCase() + name.slice(1);

            // Set session states
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('currentUser', formattedName);

            // Redirect back to home
            window.location.href = 'index.html';
          }
        });
      }
    });
  </script>
</body>

</html>
